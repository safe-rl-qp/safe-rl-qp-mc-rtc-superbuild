name: Ubuntu 24.04 install test

# Runs on the 2nd and 16th of every month at 04:00 UTC — the day after
# sync-upstream.yaml runs, so it tests whatever landed from that sync.
# Cron has no native "every 2 weeks" field; this is the closest clean
# equivalent. Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: '0 4 2,16 * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-test:
    runs-on: ubuntu-24.04
    # A bare ubuntu:24.04 image, not the GitHub-hosted runner's preinstalled
    # toolchain, so this genuinely tests "does a fresh Ubuntu 24.04 machine
    # work" the same way a new user's machine would.
    container:
      image: ubuntu:24.04
    # Full source builds of mc_rtc + dependencies can take a while; adjust
    # if you find it consistently needs more or less.
    timeout-minutes: 240

    steps:
      # actions/checkout needs git already present, but a bare ubuntu:24.04
      # image doesn't have it — install it before checkout can run.
      - name: Install git (needed before actions/checkout can run)
        env:
          DEBIAN_FRONTEND: noninteractive  # Prevents tzdata from prompting for input
        run: |
          apt-get update
          apt-get install -y tzdata
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure git identity
        # bootstrap-linux.sh / the superbuild perform git operations that
        # need an identity configured, even in CI.
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Bootstrap
        run: ./utils/bootstrap-linux.sh

      - name: Build superbuild with H1 enabled
        run: |
          cmake --preset relwithdebinfo
          cmake --build --preset relwithdebinfo
          cmake --preset relwithdebinfo -DWITH_H1=ON
          cmake --build --preset relwithdebinfo

      - name: Write mc_rtc controller config
        run: |
          mkdir -p ~/.config/mc_rtc
          cat > ~/.config/mc_rtc/mc_rtc.yaml << 'EOF'
          MainRobot: H1
          Enabled: RLController
          Timestep: 0.0025
          LogPolicy: threaded
          EOF

      - name: Install a virtual display for Mujoco
        run: apt-get install -y --no-install-recommends xvfb

      - name: Run mc_mujoco for 5s and check it doesn't crash
        shell: bash
        run: |
          source ../install/setup_mc_rtc.sh
          cd ../src/rl_controller/policy/
          set +e
          xvfb-run -a timeout -k 10 5 mc_mujoco --sync
          code=$?
          set -e
          # 124 = SIGTERM timeout, process exited on its own (success case).
          # 137 = 128+9, process ignored SIGTERM and had to be SIGKILL'd
          #       after the -k grace period (also treated as success — it
          #       just means mc_mujoco doesn't shut down cleanly on SIGTERM).
          # 0   = it exited cleanly on its own (also fine).
          # anything else = it crashed or errored out.
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ] && [ "$code" -ne 137 ]; then
            echo "mc_mujoco exited with code $code — treating as failure"
            exit 1
          fi
          echo "mc_mujoco ran for 5s without error (exit code: $code)"